apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cleanup-rox-api-token-secret
spec:
  params:
    - name: rox-api-token-secret-name
      type: string
      description: Name of the ROX API token Secret to delete
  steps:
    - image: registry.redhat.io/openshift4/ose-cli:latest
      name: delete-rox-api-token-secret
      script: |
        #!/bin/sh
        set -eu
        oc delete secret "$(params.rox-api-token-secret-name)" \
          --namespace="$(context.taskRun.namespace)" \
          --ignore-not-found=true
      computeResources: {}
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
