apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: provision-central
  namespace: default
spec:
  results:
    - name: ocm-id
      description: Name / ID of provisionned central
  stepTemplate:
    computeResources: {}
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
  steps:
    - image: registry.redhat.io/ubi8/ubi-minimal
      name: install-ocm
      script: |
        #!/bin/sh
        # arch="$(uname -m | sed "s/x86_64//")"; arch="${arch:+-$arch}"
        curl -L -f -o ocm  https://github.com/openshift-online/ocm-cli/releases/download/v1.0.14/ocm-linux-amd64
        chmod +x ocm
        ./ocm version
      workingDir: $(workspaces.binaries.path)
    - image: registry.redhat.io/ubi8/ubi-minimal
      name: ocm-login
      results:
      - name: ocm-token
        type: string
        description: OCM Token
      script: |
        #!/bin/sh
        ./ocm login --client-id ${CLIENT_ID} --client-secret ${CLIENT_SECRET}
        printf '%s' "$(./ocm token)" > $(step.results.ocm-token.path)
      env:
        - name: CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: rh-openid-credentials
              key: "client-id"
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: rh-openid-credentials
              key: "client-secret"
      workingDir: $(workspaces.binaries.path)
    - image: registry.redhat.io/ubi8/ubi-minimal
      name: provision-central
      env:
        - name: OCM_TOKEN
          value: $(steps.ocm-login.results.ocm-token)
      script: |
        #!/bin/sh
        microdnf install jq
        name="mgoerens-test-3"
        region="eu-west-1"
        curl -X POST https://api.openshift.com/api/rhacs/v1/centrals\?async\=true \
          -H "Authorization: Bearer $OCM_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"name": "'"${name}"'", "cloud_provider": "aws", "multi_az": true, "region": "'"${region}"'", "cloud_account_id": "876430114552"}' \
          | jq .
    - image: image-registry.openshift-image-registry.svc:5000/default/python3-with-requests:latest
      name: wait-for-central-ready
      script: |
        #!/bin/env python
        print("Hello from Python")

        import os
        import time
        import requests
        headers = {"Authorization": "Bearer " + os.getenv("OCM_TOKEN"), "Content-Type": "application/json"}
        central_request_status = None

        while(central_request_status != "ready"):
          print("Querying central status")
          response = requests.get("https://api.openshift.com/api/rhacs/v1/centrals/d7tka9idlgts739d6o5g", headers=headers)
          central_request = response.json()
          print(central_request)
          central_request_status = central_request.get("status")

          if (central_request_status != "ready"):
            print("Central is not ready yet, retrying in 10 seconds...")
            time.sleep(10)

        print("Central is Ready")
      env:
        - name: OCM_TOKEN
          value: $(steps.ocm-login.results.ocm-token)
  workspaces:
    - description: |
        Binaries
      name: binaries
