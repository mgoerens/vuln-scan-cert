apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: authenticate-central
spec:
  params:
    - name: rox-endpoint
      type: string
      description: Central UI Endpoint
    - name: ocm-token
      type: string
      description: Token generated when logging into OCM using Service Account credentials
    - name: rox-api-token-secret-name
      type: string
      description: |
        Name of the Secret (key rox_api_token) created for rhacs-image-scan.
        Must match the rox-api-token-auth workspace secretName on the PipelineRun.
  results:
    - name: rox-api-token
      type: string
      description: OIDC Token for ACS authentication, obtained after exchanching the OCM token
    - name: rox-api-token-secret-name
      type: string
      description: Name of the Secret containing the ROX API token
  stepTemplate:
    computeResources: {}
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
  steps:
    - image: registry.redhat.io/ubi8/ubi-minimal
      name: install-roxctl
      script: |
        #!/bin/sh
        arch="$(uname -m | sed "s/x86_64//")"; arch="${arch:+-$arch}"
        curl -L -f -o roxctl "https://mirror.openshift.com/pub/rhacs/assets/4.9.2/bin/Linux/roxctl${arch}"
        chmod +x roxctl
      workingDir: $(workspaces.binaries.path)
    - image: image-registry.openshift-image-registry.svc:5000/default/python3-with-requests:latest
      name: authenticate-central
      results:
        - name: rox-api-token
          type: string
          description: OIDC Token for ACS authentication, obtained after exchanching the OCM token
      script: |
        #!/bin/env python
        import os
        import requests

        ROX_ENDPOINT = os.getenv("ROX_ENDPOINT")
        OCM_TOKEN = os.getenv("OCM_TOKEN")
        payload = { "idToken": OCM_TOKEN }
        response = requests.post(f"{ROX_ENDPOINT}/v1/auth/m2m/exchange", json=payload)

        if response.status_code != 200:
          print("Failed exchanching OIDC token. Machine to machine authentication may not be configured")
          response.raise_for_status()

        print("Token exchange successful")

        m2m_response = response.json()
        with open('$(step.results.rox-api-token.path)', 'w') as f:
          f.write(m2m_response.get("accessToken"))
        with open('$(results.rox-api-token.path)', 'w') as f:
          f.write(m2m_response.get("accessToken"))
      env:
        - name: OCM_TOKEN
          value: $(params.ocm-token)
        - name: ROX_ENDPOINT
          value: $(params.rox-endpoint)
    - image: registry.redhat.io/ubi8/ubi-minimal
      name: test-rox-api-token
      script: |
        #!/bin/sh
        ./roxctl central whoami
      env:
        - name: ROX_API_TOKEN
          value: $(steps.authenticate-central.results.rox-api-token)
        - name: ROX_ENDPOINT
          value: $(params.rox-endpoint)
      workingDir: $(workspaces.binaries.path)
    - image: registry.redhat.io/openshift4/ose-cli:latest
      name: create-rox-api-token-secret
      results:
        - name: rox-api-token-secret-name
          type: string
      script: |
        #!/bin/sh
        set -eu
        ROX_API_TOKEN_SECRET_NAME="$(params.rox-api-token-secret-name)"
        oc create secret generic "${ROX_API_TOKEN_SECRET_NAME}" \
          --namespace="$(context.taskRun.namespace)" \
          --from-literal=rox_api_token="${ROX_API_TOKEN}" \
          --dry-run=client -o yaml | oc apply -f -
        printf '%s' "${ROX_API_TOKEN_SECRET_NAME}" > "$(step.results.rox-api-token-secret-name.path)"
        printf '%s' "${ROX_API_TOKEN_SECRET_NAME}" > "$(results.rox-api-token-secret-name.path)"
      computeResources: {}
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      env:
        - name: ROX_API_TOKEN
          value: $(steps.authenticate-central.results.rox-api-token)
        - name: ROX_API_TOKEN_SECRET_NAME
          value: $(params.rox-api-token-secret-name)
  workspaces:
    - description: |
        Binaries
      name: binaries
