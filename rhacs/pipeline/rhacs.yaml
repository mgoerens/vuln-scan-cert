apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: rhacs
spec:
  tasks:
    - name: provision-central
      taskRef:
        kind: Task
        name: provision-central
      params:
        - name: service-account-creds-secret
          value: $(params.service-account-creds-secret)
        - name: cloud-account-id
          value: $(params.cloud-account-id)
        - name: central-aws-region
          value: $(params.central-aws-region)
        - name: existing-central-id
          value: $(params.existing-central-id)
        - name: pipelinerun-uid
          value: $(context.pipelineRun.uid)
      workspaces:
        - name: binaries
          workspace: bin
    - name: authenticate-central
      taskRef:
        kind: Task
        name: authenticate-central
      params:
        - name: ocm-token
          value: $(tasks.provision-central.results.ocm-token)
        - name: rox-endpoint
          value: $(tasks.provision-central.results.rox-endpoint)
        - name: rox-api-token-secret-name
          value: $(params.rox-api-token-secret-name)
      runAfter:
        - provision-central
      workspaces:
        - name: binaries
          workspace: bin
    - name: configure-central
      taskRef:
        kind: Task
        name: configure-central
      params:
        - name: registry-redhat-creds-secret
          value: $(params.registry-redhat-creds-secret)
        - name: rox-endpoint
          value: $(tasks.provision-central.results.rox-endpoint)
        - name: rox-api-token
          value: $(tasks.authenticate-central.results.rox-api-token)
      runAfter:
        - authenticate-central
    - name: wait-for-scanner-init
      taskRef:
        kind: Task
        name: wait-for-scanner-init
      params:
        - name: rox-endpoint
          value: $(tasks.provision-central.results.rox-endpoint)
        - name: rox-api-token
          value: $(tasks.authenticate-central.results.rox-api-token)
      runAfter:
        - configure-central
    - name: run-image-scan
      taskRef:
        kind: Task
        name: rhacs-image-scan
      runAfter:
        - wait-for-scanner-init
      matrix:
        params:
          - name: image
            value: $(params.images[*])
      params:
        - name: rox_central_endpoint
          value: $(tasks.provision-central.results.rox-endpoint)
        - name: rox_token_file
          value: /rox-api-token-auth/rox_api_token
        - name: insecure-skip-tls-verify
          value: "true"
      workspaces:
        - name: rox-api-token-auth
          workspace: rox-api-token-auth
  # - name: upload-result
  params:
    - name: images
      type: array
      description: Container images to scan.
      default:
        - docker.io/library/alpine:latest
    - name: rox-api-token-secret-name
      type: string
      description: |
        Name of the Secret (key rox_api_token) for rhacs-image-scan, created by authenticate-central.
        Must match the rox-api-token-auth workspace secretName on the PipelineRun.
      default: rhacs-rox-api-token
    - name: service-account-creds-secret
      type: string
      description: Name of Secret containing Service Account credentials
      default: rh-openid-credentials
    - name: registry-redhat-creds-secret
      type: string
      description: Name of Secret containing credentials for registry.redhat.com
      default: registry-redhat-credentials
    - name: cloud-account-id
      type: string
      description: AWS ID used for Central provisioning via ACS (required when creating a new Central)
      default: ""
    - name: central-aws-region
      type: string
      description: AWS Region where to provision Central
      default: "eu-west-1"
      enum:
        - "eu-west-1"
        - "us-east-1"
    - name: existing-central-id
      type: string
      description: Existing Central ID to reuse (skip Central creation when provided)
      default: ""
    - name: destroy-central
      type: string
      description: Whether to destroy Central in the finally phase
      default: "true"
      enum:
        - "true"
        - "false"
  finally:
    - name: cleanup-rox-api-token-secret
      taskRef:
        kind: Task
        name: cleanup-rox-api-token-secret
      params:
        - name: rox-api-token-secret-name
          value: $(tasks.authenticate-central.results.rox-api-token-secret-name)
    - name: destroy-central
      taskRef:
        kind: Task
        name: destroy-central
      when:
        - input: "$(params.destroy-central)"
          operator: in
          values: ["true"]
      params:
        - name: central-id
          value: $(tasks.provision-central.results.central-id)
      workspaces:
        - name: binaries
          workspace: bin
  workspaces:
    - name: bin
    - name: rox-api-token-auth
      description: |
        ROX API token for rhacs-image-scan. Bind to the Secret named by
        param rox-api-token-secret-name (created by authenticate-central).
