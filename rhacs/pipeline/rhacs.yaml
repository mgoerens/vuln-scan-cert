apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: rhacs
  namespace: default
spec:
  tasks:
    - name: provision-central
      taskRef:
        kind: Task
        name: provision-central
      params:
        - name: cloud-account-id
          value: $(params.cloud-account-id)
        - name: pipelinerun-uid
          value: $(context.pipelineRun.uid)
      workspaces:
        - name: binaries
          workspace: bin
    # - name: authenticate-central
    # - name: wait-for-scanner-init
    # - name: run-image-scan
    # - name: upload-result
  params:
    - name: image
      type: string
      default: alpine
    - name: cloud-account-id
      type: string
  # finally:
    # - name: destroy-central
  workspaces:
    - name: bin
